name: Weekly Metadata Backfill Worker

on:
  schedule:
    # Runs every Sunday at 02:00 UTC for database maintenance
    - cron: '0 2 * * 0'
  
  # Allows manual triggering from the GitHub Actions UI
  workflow_dispatch:

jobs:
  run-backfill:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Execute Asynchronous Backfill Script
        env:
          # Suppress Node.js 20 deprecation warnings
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
          
          # Database connection for metadata enrichment
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python src/metadata_backfiller.py