name: Whale-Brief ETL Pipeline

on:
  schedule:
    # Runs every weekday (Mon-Fri) at 01:00 UTC (Post-market data availability)
    - cron: '0 1 * * 1-5'
  
  # Allows manual triggering from the GitHub Actions UI
  workflow_dispatch:

jobs:
  run-etl:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Optimizes package installation speed

      - name: 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Execute End-to-End ETL & AI Pipeline
        env:
          # Suppress Node.js 20 deprecation warnings in GitHub Actions
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
          
          # Database & Collector Credentials
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          
          # Multi-Agent AI Configuration
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          AI_REASONING_MODEL: ${{ secrets.AI_REASONING_MODEL }}
          AI_REPORT_MODEL_KO: ${{ secrets.AI_REPORT_MODEL_KO }}
          AI_REPORT_MODEL_JA: ${{ secrets.AI_REPORT_MODEL_JA }}
        run: python main.py