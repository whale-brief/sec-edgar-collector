name: FINRA Daily Darkpool Batch

on:
  schedule:
    # Runs every weekday (Mon-Fri) at 01:00 UTC (Post-market data availability)
    - cron: '0 1 * * 1-5'
  
  # Allows manual triggering from the GitHub Actions UI
  workflow_dispatch:

jobs:
  run-finra-batch:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Optimizes package installation speed

      - name: 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Execute FINRA Extractor & Dispatch Webhook
        env:
          # Webhook configuration for the API server
          WEBHOOK_BASE_URL: ${{ secrets.WEBHOOK_BASE_URL }}
          INTERNAL_TOKEN: ${{ secrets.INTERNAL_TOKEN }}
        # Runs ONLY the FINRA collector to send the bulk payload
        run: python src/finra_collector.py